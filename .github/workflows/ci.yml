name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

env:
  UMKA_REPOSITORY: andreamancuso/umka-lang
  UMKA_REF: 4cbf92ac216be0e4088ddc61aa0589df43ed066d

jobs:
  workflow-policy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Checkout Umka
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UMKA_REPOSITORY }}
          ref: ${{ env.UMKA_REF }}
          path: external/umka-lang

      - name: Verify publishing policy
        shell: pwsh
        run: ./scripts/verify-ci-publishing-policy.ps1

      - name: Verify platform support policy
        shell: pwsh
        run: ./scripts/verify-platform-support.ps1

      - name: Verify third-party notices
        shell: pwsh
        run: ./scripts/verify-third-party-notices.ps1 -UmkaRoot external/umka-lang

  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: native/build/Release/umka_shim.dll
          - os: ubuntu-latest
            rid: linux-x64
            artifact: native/build/libumka_shim.so

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Checkout Umka
        uses: actions/checkout@v4
        with:
          repository: ${{ env.UMKA_REPOSITORY }}
          ref: ${{ env.UMKA_REF }}
          path: external/umka-lang

      - name: Configure native shim
        run: cmake -S native -B native/build -DCMAKE_BUILD_TYPE=Release
        env:
          UMKA_ROOT: ${{ github.workspace }}/external/umka-lang

      - name: Build native shim
        run: cmake --build native/build --config Release

      - name: Upload native artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: ${{ matrix.artifact }}
          if-no-files-found: error

  test:
    needs: build-native
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact-name: native-win-x64
            artifact-path: native/build/Release
          - os: ubuntu-latest
            rid: linux-x64
            artifact-name: native-linux-x64
            artifact-path: native/build

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Download native artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}

      - name: Restore
        run: dotnet restore UmkaSharp.sln

      - name: Build
        run: dotnet build UmkaSharp.sln --configuration Release --no-restore

      - name: Verify benchmark harness
        shell: pwsh
        run: ./scripts/verify-benchmarks.ps1 -Configuration Release -NoBuild

      - name: Test
        run: dotnet test UmkaSharp.sln --configuration Release --no-build --verbosity normal

      - name: Verify samples
        shell: pwsh
        run: ./scripts/verify-samples.ps1 -Configuration Release -NoBuild

  pack:
    needs: [build-native, test]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Download native artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Assemble runtimes
        run: |
          mkdir -p runtimes/win-x64/native
          mkdir -p runtimes/linux-x64/native
          cp artifacts/native-win-x64/umka_shim.dll runtimes/win-x64/native/
          cp artifacts/native-linux-x64/libumka_shim.so runtimes/linux-x64/native/

      - name: Determine version
        id: version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "release" ]]; then
            VERSION="${RELEASE_TAG#v}"
          elif [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.1.0-ci.${GITHUB_RUN_NUMBER}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: >
          dotnet pack src/UmkaSharp/UmkaSharp.csproj
          --configuration Release
          /p:Version=${{ steps.version.outputs.version }}
          --output nupkg

      - name: Verify package layout
        shell: pwsh
        run: |
          $packagePath = Join-Path $PWD 'nupkg/UmkaSharp.${{ steps.version.outputs.version }}.nupkg'
          ./scripts/verify-package-layout.ps1 `
            -PackagePath $packagePath `
            -ExpectedVersion '${{ steps.version.outputs.version }}' `
            -RequireSymbols

      - name: Upload NuGet package
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: |
            nupkg/*.nupkg
            nupkg/*.snupkg

  package-smoke:
    needs: pack
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Download NuGet package
        uses: actions/download-artifact@v4
        with:
          name: nuget-package
          path: nupkg

      - name: Run package consumer sample
        shell: pwsh
        run: |
          $packageDir = Join-Path $PWD 'nupkg'
          $packageCacheDir = Join-Path $PWD '.nuget-packages'
          $project = Join-Path $PWD 'samples/PackageConsumer/PackageConsumer.csproj'
          $version = '${{ needs.pack.outputs.version }}'

          $env:NUGET_PACKAGES = $packageCacheDir
          dotnet restore $project `
            --source $packageDir `
            --packages $packageCacheDir `
            /p:UmkaSharpPackageVersion=$version

          if ($LASTEXITCODE -ne 0) {
            throw "dotnet restore failed with exit code $LASTEXITCODE."
          }

          dotnet build $project `
            --configuration Release `
            --no-restore `
            /p:UmkaSharpPackageVersion=$version

          if ($LASTEXITCODE -ne 0) {
            throw "dotnet build failed with exit code $LASTEXITCODE."
          }

          $runOutput = dotnet run `
            --project $project `
            --configuration Release `
            --no-build `
            --no-restore 2>&1

          $runExitCode = $LASTEXITCODE
          $runOutput | ForEach-Object { Write-Host $_ }

          if ($runExitCode -ne 0) {
            throw "dotnet run failed with exit code $runExitCode."
          }

          $expectedOutputPath = Join-Path $PWD 'samples/PackageConsumer/expected-output.txt'
          $expectedOutput = Get-Content -LiteralPath $expectedOutputPath | Where-Object { -not [string]::IsNullOrWhiteSpace($_) }
          foreach ($expectedLine in $expectedOutput) {
            if ($runOutput -notcontains $expectedLine) {
              throw "Package consumer output did not contain expected line '$expectedLine'."
            }
          }

  publish:
    needs: [workflow-policy, pack, package-smoke]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    steps:
      - name: Download package
        uses: actions/download-artifact@v4
        with:
          name: nuget-package
          path: nupkg

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Verify NuGet API key
        shell: bash
        run: |
          if [[ -z "$NUGET_API_KEY" ]]; then
            echo "::error::NUGET_API_KEY repository secret is required for release publishing."
            exit 1
          fi

      - name: Publish package to NuGet
        run: >
          dotnet nuget push nupkg/*.nupkg
          --api-key "$NUGET_API_KEY"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate

      - name: Publish symbols to NuGet
        run: >
          dotnet nuget push nupkg/*.snupkg
          --api-key "$NUGET_API_KEY"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
